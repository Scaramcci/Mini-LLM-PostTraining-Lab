# DPO Training Config: Qwen3-1.7B

# ==============================================================================
# 模型配置
# ==============================================================================
model_name_or_path: "Qwen/Qwen3-1.7B"      # 从 SFT adapter merge 后的模型
# 如果 SFT adapter 已经 merge，填写 merge 后的路径：
# model_name_or_path: "/path/to/merged_sft_model"

# Tokenizer 通常和模型一致，不需要单独指定
tokenizer_name_or_path: null

# ==============================================================================
# 输出路径
# ==============================================================================
output_dir: "./results/dpo_qwen3_1_7b"

# ==============================================================================
# DPO 关键超参数
# ==============================================================================
beta: 0.1                    # KL 惩罚强度。增大 -> 更保守；减小 -> 更激进
                             # 常用范围：0.01 ~ 0.5，默认 0.1

# loss_type 选项：sigmoid（默认DPO）/ ipo / kto_pair
loss_type: "sigmoid"

# ==============================================================================
# 训练超参数
# ==============================================================================
num_train_epochs: 3
per_device_train_batch_size: 2
per_device_eval_batch_size: 2
gradient_accumulation_steps: 8    # 等效 batch = 2 * 8 = 16
learning_rate: 5.0e-7             # DPO 的 lr 通常比 SFT 小一个量级
lr_scheduler_type: "cosine"
warmup_ratio: 0.1
weight_decay: 0.0

# ==============================================================================
# 序列长度
# ==============================================================================
max_length: 1024              # prompt + chosen/rejected 的最大总长度
max_prompt_length: 512        # prompt 部分的最大长度

# ==============================================================================
# 精度 / 显存优化
# ==============================================================================
bf16: true
tf32: true
gradient_checkpointing: true  # 开启后省显存，但训练慢约 30%

# 量化（如显存紧张可开启 4bit 量化）
# load_in_4bit: true
# bnb_4bit_quant_type: "nf4"
# bnb_4bit_use_double_quant: true

# ==============================================================================
# 日志与保存
# ==============================================================================
logging_steps: 10
eval_strategy: "steps"
eval_steps: 100
save_strategy: "steps"
save_steps: 200
save_total_limit: 2

# ==============================================================================
# 数据集配置（在代码里直接加载，这里只做说明）
# ==============================================================================
# dataset_path: "./data/preference_toy_train.jsonl"
# eval_dataset_path: "./data/preference_toy_val.jsonl"

# ==============================================================================
# 注意事项
# ==============================================================================
# 1. reference model：
#    TRL DPOTrainer 默认会将 model 的副本作为 ref_model，不需要额外指定。
#    如果你想显式传入：在 train_dpo.py 里单独加载 ref_model。
#
# 2. 显存估算（Qwen3-1.7B，bfloat16）：
#    policy model：约 3-4 GB
#    reference model（不更新）：约 3-4 GB
#    activation + optimizer：约 6-10 GB
#    合计估算：约 12-18 GB，4090 24GB 应可跑 batch_size=2
#
# 3. 如果 OOM：
#    - 减小 max_length（如 512）
#    - 减小 per_device_train_batch_size（如 1）
#    - 增大 gradient_accumulation_steps 保持等效 batch 不变
#    - 开启 4bit 量化
#
# 4. 先用 Qwen3-0.6B 跑通，确认无误后再换 1.7B
